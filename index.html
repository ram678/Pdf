
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Tools Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>PDF Tools Pro</h1>
<p>Convert PDF ↔ Word instantly</p>
</header>

<div class="container">

<div class="card">
<h2>PDF → Word</h2>
<input type="file" id="pdfFile" accept=".pdf">
<button onclick="pdfToWord()">Convert</button>
</div>

<div class="card">
<h2>Word → PDF</h2>
<input type="file" id="docxFile" accept=".docx">
<button onclick="wordToPdf()">Convert</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
